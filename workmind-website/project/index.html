<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WorkMind.ai — Redesign</title>
<link rel="stylesheet" href="redesign/styles.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--ink); }
  #root { position: fixed; inset: 0; }
  /* Responsive collapses */
  @media (max-width: 1000px){
    .wm-herogrid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .wm-statswrap { grid-template-columns: 1fr !important; }
    .wm-indgrid, .wm-casegrid, .wm-testgrid { grid-template-columns: 1fr 1fr !important; }
    .wm-wall, .wm-clientmini { grid-template-columns: repeat(4,1fr) !important; }
    .wm-diffgrid, .wm-credband, .wm-statsband { grid-template-columns: 1fr 1fr !important; }
    .wm-solrow { grid-template-columns: 56px 1fr !important; }
    .wm-solrow > div:nth-child(3), .wm-solrow > div:nth-child(4) { grid-column: 2; border-left: none !important; padding-left: 0 !important; text-align: left !important; }
    .wm-contactgrid, .wm-aboutgrid { grid-template-columns: 1fr !important; }
    .wm-method { grid-template-columns: repeat(2,1fr) !important; }
  }
  @media (max-width: 820px){
    .wm-bento > * { grid-column: span 2 !important; }
    .wm-navlinks, .wm-navcta { display: none !important; }
    .wm-burger { display: inline-flex !important; }
    .wm-cta-band { flex-direction: column; align-items: flex-start !important; }
  }
  @media (max-width: 620px){
    .wm-indgrid, .wm-casegrid, .wm-testgrid, .wm-footgrid, .wm-method, .wm-diffgrid, .wm-credband, .wm-statsband { grid-template-columns: 1fr !important; }
    .wm-wall, .wm-clientmini { grid-template-columns: repeat(2,1fr) !important; }
  }
  /* image-slot theming to match glass */
  image-slot { --is-bg: rgba(255,255,255,0.03); border-radius: 0; }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0D1B2A"/>
    <g transform="translate(50,48)" fill="#4BAAC8">
      <circle cx="-6" cy="-6" r="8"/><circle cx="6" cy="4" r="8"/><circle cx="-6" cy="10" r="6"/>
      <circle cx="20" cy="-14" r="5"/><circle cx="22" cy="16" r="4"/>
    </g>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="redesign/image-slot.js"></script>

<script type="text/babel" src="redesign/Foundations.jsx"></script>

<script type="text/babel" src="redesign/Pages.jsx"></script>
<script type="text/babel" src="redesign/App.jsx"></script>
</body>
</html>
